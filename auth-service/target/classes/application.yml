spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/qma_user_service_db
    username: root
    password: 05092006

  boot:
    admin:
      client:
        url: http://localhost:9090

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${google_client_id}
            client-secret: ${google_client_secret}

  jpa:
