spring:
  application:
    name: quantity-service

  boot:
    admin:
      client:
        url: http://localhost:9090

  datasource:
    url: jdbc:mysql://localhost:3306/qma_quantity_service_db?createDatabaseIfNotExist=true
    username: root
    password: 05092006

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always